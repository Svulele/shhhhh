services:
  - type: web
    name: shhhh-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
